[phases.setup]
nixPkgs = ["nodejs_22", "python312Full", "gcc"]

[phases.install]
cmds = ["python -m pip install -r requirements.txt", "cd frontend && npm install && cd .."]

[phases.build]
cmds = ["cd frontend && npm run build && cd .."]

[start]
cmd = "uvicorn server:app --host 0.0.0.0 --port ${PORT:-8080}"

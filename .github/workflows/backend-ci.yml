name: backend-ci

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colazione
          POSTGRES_PASSWORD: colazione
          POSTGRES_DB: colazione
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U colazione -d colazione"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://colazione:colazione@localhost:5432/colazione

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies (with dev)
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy src/colazione

      - name: Apply Alembic migrations
        run: uv run alembic upgrade head

      - name: Pytest (with DB)
        run: uv run pytest --cov=src/colazione --cov-report=term-missing
